groups:
  - name: anomalies
    interval: 1m
    # THRESHOLD_SPARSE = 5/60
    rules:
      - record: anomaly:adaptive:select
        expr: |-
          (
            {anomaly_name!="", anomaly_type="requests", anomaly_select="", anomaly_strategy=~"^$|adaptive"} > 0
            unless avg_over_time({anomaly_name!="", anomaly_type="requests", anomaly_select="", anomaly_strategy=~"^$|adaptive"}[1h]) < 5/60 
          )
          OR
          {anomaly_name!="", anomaly_type="latency", anomaly_select="", anomaly_strategy=~"^$|adaptive"} > 0
          OR
          {anomaly_name!="", anomaly_type="errors", anomaly_select="", anomaly_strategy=~"^$|adaptive"} > 0
          OR
          {anomaly_name!="", anomaly_type="resource", anomaly_select="", anomaly_strategy=~"^$|adaptive"} > 0
          OR
          {anomaly_name!="", anomaly_select="", anomaly_strategy=~"^$|adaptive"} > 0
        labels:
          anomaly_select: "1"
          anomaly_strategy: adaptive

      - record: anomaly:adaptive:avg_1h
        expr: avg_over_time(anomaly:adaptive:select[1h])

      # THRESHOLD_BY_COVAR = 0.5
      - record: anomaly:adaptive:stddev_1h:filtered
        expr: |-
          stddev_over_time(anomaly:adaptive:select[1h]) > anomaly:adaptive:avg_1h * 0.5

      - record: anomaly:adaptive:stddev_st
        expr: avg_over_time(anomaly:adaptive:stddev_1h:filtered[26h])

      # STDDEV_MULTIPLIER = 2
      - record: upper_band_st
        expr: anomaly:adaptive:avg_1h + anomaly:adaptive:stddev_st * 2

      # STDDEV_MULTIPLIER = 2
      - record: lower_band_st
        expr: anomaly:adaptive:avg_1h - anomaly:adaptive:stddev_st * 2

      - record: upper_band
        expr: |-
          max without(prediction_type)
          (
            label_replace(
              # MARGIN_MULTIPLIER = 1.5
              # margin_upper_band
              anomaly:adaptive:avg_1h * 1.5,
              "prediction_type", "margin", "", ""
            )
            or
            label_replace(
              upper_band_st,
              "prediction_type", "short_term", "", ""
            )
          )

      - record: lower_band
        expr: |-
          clamp_min(
            min without(prediction_type)
            (
              label_replace(
                # MARGIN_MULTIPLIER = 1.5
                # margin_lower_band
                anomaly:adaptive:avg_1h / 1.5,
                "prediction_type", "margin", "", ""
              )
              or
              label_replace(
                lower_band_st,
                "prediction_type", "short_term", "", ""
              )
            ),
            0
          )

  - name: AnomalyAdaptiveAlerts
    rules:
      - alert: AnomalyDetected
        for: 5m
        expr: >
          last_over_time(anomaly:adaptive:select[2m]) < last_over_time(anomaly:lower_band{anomaly_strategy="adaptive"}[2m])
          or
          last_over_time(anomaly:adaptive:select[2m]) > last_over_time(anomaly:upper_band{anomaly_strategy="adaptive"}[2m])
        labels:
          severity: warning
          anomaly_strategy: adaptive
